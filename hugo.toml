baseURL = "https://kklullaby.github.io/"
languageCode = "zh-cn"
title = "kkLullaby's Blog"
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true

[minify]
  disableXML = true
  minifyOutput = false

[params]
  env = "production"
  title = "kkLullaby's Blog"
  description = "一个专注于技术分享与生活感悟的个人博客"
  keywords = ["Blog", "技术博客", "生活", "学习笔记"]
  author = "kkLullaby"
  
  # 主题设置
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = true
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  # 首页信息
  [params.homeInfoParams]
    Title = "各位朋友，欢迎来到我的互联网自留地 👋"
    Content = "这个小站是我——探索世界无限可能，分享生活的美好的地方，记录着我的学习历程、技术心得和生活感悟。"

  # 社交图标
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/kklullaby"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:lkf1234567i@gmail.com"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  # 封面图片设置
  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  # 编辑建议
  [params.editPost]
    URL = "https://github.com/kklullaby/kklullaby.github.io/tree/main/content"
    Text = "建议编辑此页"
    appendFilePath = true

  # 搜索设置
  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

# 菜单配置
[menu]
  [[menu.main]]
    identifier = "home"
    name = "🏠 首页"
    url = "/"
    weight = 10

  [[menu.main]]
    identifier = "search"
    name = "🔍 搜索"
    url = "/search/"
    weight = 20

  [[menu.main]]
    identifier = "archives"
    name = "📚 归档"
    url = "/archives/"
    weight = 30

  [[menu.main]]
    identifier = "categories"
    name = "📂 专栏"
    url = "/categories/"
    weight = 40

  [[menu.main]]
    identifier = "tags"
    name = "🏷️ 标签"
    url = "/tags/"
    weight = 50

  [[menu.main]]
    identifier = "projects"
    name = "🚀 项目"
    url = "/projects/"
    weight = 55

  [[menu.main]]
    identifier = "about"
    name = "👤 关于"
    url = "/about/"
    weight = 60

  [[menu.main]]
    identifier = "resume"
    name = "📄 简历"
    url = "/resume/"
    weight = 65

  [[menu.main]]
    identifier = "links"
    name = "🔗 友链"
    url = "/links/"
    weight = 70

# 输出格式
[outputs]
  home = ["HTML", "RSS", "JSON"]

# 分类设置
[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

# Markdown 设置
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    lineNos = false
    noClasses = false
    style = "monokai"
